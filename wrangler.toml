name = "flaremask"
main = "worker/build/index.js"
compatibility_date = "2026-05-03"

[build]
command = "npm run build"

[assets]
directory = "./client/dist"
not_found_handling = "single-page-application"
run_worker_first = ["/auth/*", "/api/*"]

[vars]
OIDC_ISSUER_URL = "https://your-oidc-url"
OIDC_CLIENT_ID = "flaremask"
OIDC_REDIRECT_URI = "http://localhost:8787/auth/callback"
CF_ZONE_ID = "your-cf-zone-id"
TOKEN_EXPIRY = "3600"

# optional: skips a zone API call on each alias creation
# and makes the token not need the zone:read
CF_EMAIL_DOMAIN = "yourdomain.com"
