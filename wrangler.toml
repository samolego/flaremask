name = "flaremask"
main = "worker/build/index.js"
compatibility_date = "2026-05-03"

[build]
command = "cd client && npm install && npm run build && cd ../worker && cargo install -q \"worker-build@^0.8\" && worker-build --release"

[vars]
OIDC_ISSUER_URL = "https://your-oidc-url"
OIDC_CLIENT_ID = "flaremask"
OIDC_REDIRECT_URI = "http://localhost:8787/auth/callback"
CF_ZONE_ID = "your-cf-zone-id"
# CF_EMAIL_DOMAIN = "yourdomain.com"  # optional: skips a zone API call on each alias creation
TOKEN_EXPIRY = "3600"
